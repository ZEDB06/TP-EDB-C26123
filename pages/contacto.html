    <main>
      <h1 class="titulo-contacto text-dark">Contáctanos</h1>

      <form class="form-contacto" action="" method="POST">
        <div class="grupo-input">
          <label for="email"> <h3>Email:</h3> </label>
          <input type="email" id="email" style="width: 500px; height: 30px;" maxlength="30" required />
        </div>
        <div class="grupo-input">
          <label for="mensaje"> <h3>Dejános tu mensaje:</h3> </label>
          <textarea id="mensaje" name="mensaje" style="width: 500px; height: 200px;"></textarea>
        </div>
        <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
      </form>
    </main>
